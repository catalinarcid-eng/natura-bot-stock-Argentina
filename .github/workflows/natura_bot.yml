name: Natura Stock Bot

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests==2.32.3

      - name: Restaurar memoria
        uses: actions/cache@v4
        with:
          path: memoria.json
          key: natura-memoria-${{ github.run_id }}
          restore-keys: |
            natura-memoria-

      - name: Ejecutar bot
        run: python natura_bot.py

      - name: Guardar memoria actualizada
        if: always()
        uses: actions/cache/save@v4
        with:
          path: memoria.json
          key: natura-memoria-${{ github.run_id }}

