name: Natura Stock Bot Argentina
 
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
 
      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
 
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Ejecutar bot
        run: python natura_bot.py
 
      - name: Guardar memoria en el repositorio
        run: |
          git config --global user.name "NaturaStockBot"
          git config --global user.email "bot@natura.internal"
          git add memoria.json
          if git diff --staged --quiet; then
            echo "Sin cambios en memoria."
          else
            git commit -m "🤖 Memoria actualizada [skip ci]"
            git push
          fi
